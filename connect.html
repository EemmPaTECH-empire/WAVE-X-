<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVE X 🌊 - Connect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="dashboard">
  <h2>Welcome, <span id="user-name">User</span></h2>
  <p>Select how you want to connect:</p>

  <div class="contact-buttons">
    <button onclick="selectContact('phone')">📞 Phone Contact</button>
    <button onclick="selectContact('whatsapp')">💬 WhatsApp Contact</button>
    <button onclick="selectContact('email')">✉ Email Contact</button>
  </div>

  <div class="contact-selection" id="contact-selection">
    <!-- Selected contact info appears here -->
  </div>
</main>

<footer class="minimal-footer">
  Powered by BMT Mobile
</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
